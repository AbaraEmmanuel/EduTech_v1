<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --sidebar-bg: #0f1419;
            --sidebar-hover: #1a2332;
            --sidebar-active: #2d4b7c;
            --content-bg: #f8f9fa;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-light: #7a7a9a;
            --border-color: #e8ecf1;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --accent-blue: #3b6fc9;
            --accent-indigo: #6c5ce7;
            --accent-green: #00b894;
            --accent-orange: #fdcb6e;
            --accent-red: #e17055;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== Dark Mode Variables ===== */
        body.dark-mode {
            --content-bg: #14181f;
            --text-primary: #e8edf5;
            --text-secondary: #b0b8c8;
            --text-light: #7a8499;
            --border-color: #2a3344;
            --card-bg: #1c2333;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--content-bg);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--sidebar-bg);
            color: #c8d0dc;
            padding: 28px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            transition: background 0.4s ease;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }

        .sidebar-brand .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
        }

        .sidebar-brand span {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .sidebar .tab {
            background: transparent;
            border: none;
            color: #9aa4b8;
            padding: 12px 16px;
            text-align: left;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 400;
            position: relative;
        }

        .sidebar .tab i {
            width: 20px;
            font-size: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar .tab:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .sidebar .tab.active {
            background: var(--sidebar-active);
            color: #fff;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(59, 111, 201, 0.3);
        }

        .sidebar .tab.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--accent-blue);
            border-radius: 0 3px 3px 0;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 8px 12px;
        }

        .sidebar .tab.logout {
            margin-top: auto;
            color: #e17055;
        }

        .sidebar .tab.logout:hover {
            background: rgba(225, 112, 85, 0.15);
            color: #e17055;
        }

        /* ===== Content Area ===== */
        .content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            background: var(--content-bg);
            transition: background 0.4s ease;
            min-width: 0;
        }

        /* ===== Page Header ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h2 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* ===== Buttons ===== */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 111, 201, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 111, 201, 0.4);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-blue);
            background: var(--accent-blue);
            color: #fff;
        }

        /* ===== Dashboard Grid ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }

        .dashboard-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-blue);
        }

        .dashboard-card .icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 16px;
        }

        .dashboard-card .icon-wrapper.blue { background: rgba(59, 111, 201, 0.12); color: var(--accent-blue); }
        .dashboard-card .icon-wrapper.indigo { background: rgba(108, 92, 231, 0.12); color: var(--accent-indigo); }
        .dashboard-card .icon-wrapper.green { background: rgba(0, 184, 148, 0.12); color: var(--accent-green); }
        .dashboard-card .icon-wrapper.orange { background: rgba(253, 203, 110, 0.2); color: #d4a017; }
        .dashboard-card .icon-wrapper.red { background: rgba(225, 112, 85, 0.12); color: var(--accent-red); }

        .dashboard-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .dashboard-card p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0;
            line-height: 1.5;
        }

        .dashboard-card .stat {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 12px;
        }

        .dashboard-card .stat-label {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* ===== Tab Content Placeholder ===== */
        .tab-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Mode Toggle ===== */
        .mode-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            z-index: 100;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-toggle:hover {
            transform: scale(1.08) rotate(20deg);
            box-shadow: var(--shadow-lg);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                min-width: 60px;
                padding: 16px 8px;
            }

            .sidebar-brand span,
            .sidebar .tab span:not(.icon) {
                display: none;
            }

            .sidebar .tab {
                justify-content: center;
                padding: 12px;
                font-size: 0;
            }

            .sidebar .tab i {
                font-size: 20px;
                width: auto;
            }

            .content {
                padding: 20px;
            }

            .page-header h2 {
                font-size: 20px;
            }

            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }

        /* ===== Welcome Section ===== */
        .welcome-section {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo));
            border-radius: var(--radius);
            padding: 32px 36px;
            color: #fff;
            margin-bottom: 32px;
            box-shadow: 0 8px 30px rgba(59, 111, 201, 0.3);
        }

        .welcome-section h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .welcome-section p {
            opacity: 0.85;
            font-size: 15px;
            margin: 0;
        }

        /* ===== Activity Feed ===== */
        .activity-feed {
            margin-top: 32px;
        }

        .activity-feed h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .activity-dot.blue { background: var(--accent-blue); }
        .activity-dot.green { background: var(--accent-green); }
        .activity-dot.orange { background: var(--accent-orange); }
        .activity-dot.red { background: var(--accent-red); }

        .activity-item .text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .activity-item .text strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .activity-item .time {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-light);
        }

        /* ===== Loading State ===== */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .loading-spinner i {
            font-size: 32px;
            color: var(--accent-blue);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Mode Toggle -->
    <button class="mode-toggle" id="modeToggle" aria-label="Toggle theme">☀️</button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo">T</div>
            <span>TutorHub</span>
        </div>

        <button class="tab active" data-tab="dashboard">
            <i class="fas fa-th-large"></i><span>Dashboard</span>
        </button>
        <button class="tab" data-tab="students">
            <i class="fas fa-user-graduate"></i><span>Students</span>
        </button>
        <button class="tab" data-tab="curriculum">
            <i class="fas fa-book-open"></i><span>Curriculum</span>
        </button>
        <button class="tab" data-tab="schedule">
            <i class="fas fa-calendar-alt"></i><span>Schedule</span>
        </button>
        <button class="tab" data-tab="messages">
            <i class="fas fa-envelope"></i><span>Messages</span>
        </button>
        <button class="tab" data-tab="notifications">
            <i class="fas fa-bell"></i><span>Notifications</span>
        </button>
        <button class="tab" data-tab="payments">
            <i class="fas fa-credit-card"></i><span>Payments</span>
        </button>

        <hr class="sidebar-divider">

        <button class="tab" data-tab="profile">
            <i class="fas fa-user"></i><span>My Profile</span>
        </button>
        <button class="tab logout" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </button>
    </div>

    <!-- Main Content -->
    <div class="content" id="mainContent">
        <!-- Dynamic content will be rendered here -->
    </div>

    <script type="module">
        // ===== Firebase Imports =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

        // ===== Firebase Config =====
        const firebaseConfig = {
            apiKey: "AIzaSyBnzUWyfIDIlKtNsjlwHhA3JhR5LHhb9qU",
            authDomain: "edtech-tutors.firebaseapp.com",
            projectId: "edtech-tutors",
            storageBucket: "edtech-tutors.appspot.com",
            messagingSenderId: "87645108821",
            appId: "1:87645108821:web:ff6957f6cb738dc2bcf2dc",
            measurementId: "G-GTXDL1WX0L"
        };

        // ===== Initialize Firebase =====
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===== DOM Refs =====
        const content = document.getElementById('mainContent');
        const sidebarTabs = document.querySelectorAll('.tab[data-tab]');
        const logoutBtn = document.getElementById('logoutBtn');
        const modeToggle = document.getElementById('modeToggle');

        // ===== State =====
        let currentTab = 'dashboard';
        let currentUser = null;
        let userData = null;

        // ===== Render Functions =====
        function renderDashboard() {
            const name = userData?.name || 'Tutor';
            const email = userData?.email || '';

            return `
                <div class="tab-content">
                    <div class="welcome-section">
                        <h2>Welcome back, ${name} 👋</h2>
                        <p>Here's what's happening with your students and courses today.</p>
                    </div>

                    <div class="dashboard-grid">
                        <div class="dashboard-card" onclick="navigateTo('students')">
                            <div class="icon-wrapper blue"><i class="fas fa-user-graduate"></i></div>
                            <h3>Students</h3>
                            <p>Manage your enrolled students</p>
                            <div class="stat">12 <span class="stat-label">active</span></div>
                        </div>

                        <div class="dashboard-card" onclick="navigateTo('curriculum')">
                            <div class="icon-wrapper indigo"><i class="fas fa-book-open"></i></div>
                            <h3>Courses</h3>
                            <p>Active courses this semester</p>
                            <div class="stat">4 <span class="stat-label">courses</span></div>
                        </div>

                        <div class="dashboard-card" onclick="navigateTo('schedule')">
                            <div class="icon-wrapper green"><i class="fas fa-calendar-alt"></i></div>
                            <h3>Schedule</h3>
                            <p>Upcoming sessions this week</p>
                            <div class="stat">8 <span class="stat-label">sessions</span></div>
                        </div>

                        <div class="dashboard-card" onclick="navigateTo('payments')">
                            <div class="icon-wrapper orange"><i class="fas fa-credit-card"></i></div>
                            <h3>Payments</h3>
                            <p>Earnings this month</p>
                            <div class="stat">$2,450 <span class="stat-label">USD</span></div>
                        </div>
                    </div>

                    <div class="activity-feed">
                        <h4>Recent Activity</h4>
                        <div class="activity-item">
                            <span class="activity-dot blue"></span>
                            <span class="text"><strong>Sarah Chen</strong> submitted assignment #3</span>
                            <span class="time">2h ago</span>
                        </div>
                        <div class="activity-item">
                            <span class="activity-dot green"></span>
                            <span class="text"><strong>New student</strong> enrolled in Chemistry 101</span>
                            <span class="time">5h ago</span>
                        </div>
                        <div class="activity-item">
                            <span class="activity-dot orange"></span>
                            <span class="text"><strong>Payment received</strong> from Michael Torres</span>
                            <span class="time">1d ago</span>
                        </div>
                        <div class="activity-item">
                            <span class="activity-dot red"></span>
                            <span class="text"><strong>Class rescheduled:</strong> Physics lab moved to Friday</span>
                            <span class="time">2d ago</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPlaceholder(title, icon = 'fa-info-circle', description = 'This section is under development.') {
            return `
                <div class="tab-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;">
                    <i class="fas ${icon}" style="font-size:48px;color:var(--text-light);margin-bottom:16px;opacity:0.4;"></i>
                    <h2 style="font-weight:500;color:var(--text-primary);">${title}</h2>
                    <p style="color:var(--text-secondary);max-width:400px;margin-top:8px;">${description}</p>
                </div>
            `;
        }

        function renderProfile() {
            const name = userData?.name || 'Tutor';
            const email = userData?.email || '';
            return `
                <div class="tab-content">
                    <div class="page-header">
                        <div>
                            <h2>My Profile</h2>
                            <span class="subtitle">Manage your account information</span>
                        </div>
                        <div class="header-actions">
                            <button class="btn btn-secondary">Edit Profile</button>
                        </div>
                    </div>
                    <div style="background:var(--card-bg);border-radius:var(--radius);padding:32px;border:1px solid var(--border-color);max-width:600px;">
                        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;">
                            <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent-blue),var(--accent-indigo));display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:600;">
                                ${name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h3 style="margin:0;font-size:20px;">${name}</h3>
                                <p style="margin:4px 0 0;color:var(--text-secondary);">${email}</p>
                            </div>
                        </div>
                        <hr style="border-color:var(--border-color);margin:20px 0;">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                            <div><span style="color:var(--text-light);font-size:13px;">Specialization</span><div style="font-weight:500;">Mathematics</div></div>
                            <div><span style="color:var(--text-light);font-size:13px;">Experience</span><div style="font-weight:500;">5 years</div></div>
                            <div><span style="color:var(--text-light);font-size:13px;">Students</span><div style="font-weight:500;">12 active</div></div>
                            <div><span style="color:var(--text-light);font-size:13px;">Rating</span><div style="font-weight:500;">⭐ 4.8</div></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== Navigation =====
        window.navigateTo = function(tab) {
            showTab(tab);
        };

        function showTab(tab) {
            currentTab = tab;
            let html = '';

            switch(tab) {
                case 'dashboard':
                    html = renderDashboard();
                    break;
                case 'students':
                    html = renderPlaceholder('Students', 'fa-user-graduate', 'Manage your student roster, track progress, and communicate with learners.');
                    break;
                case 'curriculum':
                    html = renderPlaceholder('Curriculum', 'fa-book-open', 'Organize your course materials, lesson plans, and learning resources.');
                    break;
                case 'schedule':
                    html = renderPlaceholder('Schedule', 'fa-calendar-alt', 'View and manage your class schedule, appointments, and availability.');
                    break;
                case 'messages':
                    html = renderPlaceholder('Messages', 'fa-envelope', 'Communicate with students and parents through the messaging system.');
                    break;
                case 'notifications':
                    html = renderPlaceholder('Notifications', 'fa-bell', 'Stay updated with the latest alerts and important announcements.');
                    break;
                case 'payments':
                    html = renderPlaceholder('Payments', 'fa-credit-card', 'Track your earnings, view payment history, and manage invoices.');
                    break;
                case 'profile':
                    html = renderProfile();
                    break;
                default:
                    html = renderDashboard();
            }

            content.innerHTML = html;

            // Update active tab
            sidebarTabs.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
        }

        // ===== Sidebar Click Handler =====
        sidebarTabs.forEach(btn => {
            btn.addEventListener('click', () => {
                showTab(btn.dataset.tab);
            });
        });

        // ===== Logout =====
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'tutors-sign_in.html';
            }).catch(err => {
                console.error('Logout error:', err);
            });
        });

        // ===== Load User Data =====
        async function loadUserData(uid) {
            try {
                const docRef = doc(db, 'tutors', uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    if (currentTab === 'dashboard') showTab('dashboard');
                } else {
                    userData = { name: 'Tutor', email: '' };
                }
            } catch (err) {
                console.error('Error loading user data:', err);
                userData = { name: 'Tutor', email: '' };
            }
        }

        // ===== Auth State =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                showTab('dashboard');
            } else {
                window.location.href = 'tutors-sign_in.html';
            }
        });

        // ===== Theme Toggle =====
        function setTheme(theme) {
            document.body.className = theme;
            modeToggle.textContent = theme === 'dark-mode' ? '🌙' : '☀️';
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light-mode';
        setTheme(savedTheme);

        modeToggle.addEventListener('click', () => {
            const next = document.body.classList.contains('dark-mode') ? 'light-mode' : 'dark-mode';
            setTheme(next);
        });

        // ===== Expose showTab for inline onclick =====
        window.showTab = showTab;

        console.log('🚀 Tutor Dashboard ready');
    </script>
</body>
</html>
